<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Frontend</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="header">
        <div id="textFieldsHeader">
            <input id="textId" type="text" placeholder="ID" readonly>
            <input id="textName" type="text" placeholder="Nome">
            <input id="textCity" type="text" placeholder="Cidade">
        </div>
        
        <div id="buttonsHeader">
            <button id="btnFindPerson" onclick="findPersonByName()">
                Buscar pessoa
            </button>

            <button id="btnUpdate" onclick="updatePerson()">
                Alterar pessoa
            </button>

            <button id="btnCreate" onclick="createPerson()">
                Criar pessoa
            </button>

            <button id="btnDelete" onclick="deletePerson()">
                Deletar pessoa
            </button>
        </div>

        <div id="message"></div>
    </div>
    

    <div id="people"></div>

    <div class="container">
        <button id="btnPrevious" onclick="previousPage()">
            Anterior
        </button>

        <button id="btnNext" onclick="nextPage()">
            Próxima
        </button>
    </div>
    
    <script src="script.js"></script>

</body>

</html>
